<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>InforShop</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/069baf1ef0.js" crossorigin="anonymous"></script>

</head>
<body>
<header class="header">
    <div class="container">
        <div class="logo-box">
            <img src="img/inforshop.png" alt="" class="logo">
        </div>
        <form class="form-search-box">
            <label for="search"></label>
            <input type="search" class="search-input" id="search" name="search" placeholder="Chercher un produit ...">
            <img src="img/search2.png" alt="" class="search-icon">
        </form>
        <div class="user-and-cart-container">
            <div class="user-icon-container">
                <img src="img/user2.png" alt="User Icon" class="user-icon">
            </div>
            <div class="cart-icon-container">
                <img src="img/cart2.png" alt="Cart Icon" class="cart-icon">
                <div class="cart-count-container">
                    <span class="cart-count">0</span>
                </div>

            </div>
        </div>
    </div>
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="#">Produits</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    <div class="hamburger-container active">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
    </div>
    <div class="x-button-container">
        <span class="x-button-line x-button-first-line"></span>
        <span class="x-button-line x-button-second-line"></span>
    </div>
</header>
<main class="main">
    <div class="sub-nav">
        <img src="img/home.png" alt="Home icon" class="home-icon">
        <i class="fa-solid fa-angle-right sub-nav-arrow"></i>
        <a href="inscription.html" class="navigation-button inscription">Inscription</a>
    </div>
    <form action="/submit-form" method="post" class="inscription-form">
        <h2 class="inscription-form-heading">Inscription</h2>
        <label class="label label-email"  for="email">Email*
            <input class="inscription-form-input" type="email" id="email" name="email" required>
        </label>
        <label class="label label-password"  for="password">Mot de passe*
            <input class="inscription-form-input" type="password" id="password" name="password" required>
        </label>
        <label class="label label-name" for="name">Prénom*
            <input class="inscription-form-input" type="text" id="name" name="name" required>
        </label>
        <label class="label label-surname" for="surname">Nom*
            <input class="inscription-form-input" type="text" id="surname" name="surname" required>
        </label>
        <label class="label label-birth-year"  for="birth-year">Date de naissance*
            <input class="inscription-form-input" type="number" id="birth-year" name="birth-year" required>
        </label>
        <label class="label label-conditions"  for="conditions">
            <input class="inscription-form-checkbox" type="checkbox" id="conditions" name="conditions" required><span class="inscription-form-checkbox-text"> J'ai lu et j'accepte les <span class="checkbox-conditions-span">CGV</span> ...*</span>
        </label>


        <button class="inscription-form-submit-btn btn-gray" type="submit"><i class="fa-solid fa-check connection-button-check-icon"></i>Inscription</button>


    </form>

</main>
<footer class="footer">
    <div class="footer-container">
        <p>© Inforshop.store & site by <span class="footer-created-by">ISL SCRL</span></p>
    </div>
</footer>
<script src="script.js"></script>
</body>
</html>
